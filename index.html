const ENCRYPTED = JSON.parse(document.getElementById('encrypted-blob').textContent);

function b64ToBytes(b64) {
  const bin = atob(b64);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

async function decryptData(password) {
  const salt = b64ToBytes(ENCRYPTED.salt);
  const iv = b64ToBytes(ENCRYPTED.iv);
  const ciphertext = b64ToBytes(ENCRYPTED.ciphertext);
  const passwordKey = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password),
    { name: "PBKDF2" }, false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: ENCRYPTED.iterations, hash: "SHA-256" },
    passwordKey,
    { name: "AES-GCM", length: 256 },
    false, ["decrypt"]
  );
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
  const obj = JSON.parse(new TextDecoder().decode(plain));
  analyzed = obj.analyzed;
  competitor = obj.competitor;
  ideasData = obj.ideas;
  return true;
}

function KeywordTrends() {
  const [expanded, setExpanded] = useState(false);
  const map = {};
  analyzed.data.forEach(it => {
    (it.analysis.keywords || []).forEach(k => { map[k] = (map[k]||0)+1; });
  });
  const all = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const top = expanded ? all : all.slice(0, 5);
  const max = all[0] ? all[0][1] : 1;
  return (
    <div className="bg-white border border-slate-200 rounded-xl p-5">
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-base font-bold text-slate-900">주요 트렌드 키워드</h2>
        <button onClick={() => setExpanded(v => !v)} className="text-xs text-orange-600 font-medium hover:text-orange-700 flex items-center gap-0.5">
          {expanded ? '접기' : '더보기'} <Icon name="chevron" className="w-3 h-3" />
        </button>
      </div>
      <ul className="space-y-2.5">
        {top.map(([k,v]) => (
          <li key={k} className="flex items-center gap-3">
            <span className="text-sm text-slate-700 w-24 truncate">{k}</span>
            <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
              <div className="h-full bg-orange-500 rounded-full" style={{ width: `${(v/max)*100}%` }} />
            </div>
            <span className="text-sm font-semibold text-slate-700 tabular-nums w-6 text-right">{v}</span>
          </li>
        ))}
      </ul>
    </div>
  );
}

const PAGE_TITLE = {
  dashboard: '대시보드',

function PageSignals({ onSelect }) {
  const [search, setSearch] = useState('');
  const [category, setCategory] = useState(null);
  const [importance, setImportance] = useState(null);
  const sorted = [...analyzed.data].sort((a,b)=>b.analysis.importance_score - a.analysis.importance_score);
  const categories = [...new Set(analyzed.data.map(x => x.original.category))];
  const filtered = sorted.filter(it => {
    if (category && it.original.category !== category) return false;
    if (importance === 'high' && it.analysis.importance_score < 5) return false;
    if (importance === 'mid' && it.analysis.importance_score !== 4) return false;
    if (importance === 'low' && it.analysis.importance_score >= 4) return false;
    if (search && !`${it.original.title} ${it.analysis.summary}`.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  return (
    <div className="space-y-4">
      <div className="bg-white border border-slate-200 rounded-xl p-4">
        <div className="flex flex-wrap items-center gap-2">
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="🔎  제목·요약 검색..."
            className="flex-1 min-w-[200px] px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-slate-400" />
          <div className="flex flex-wrap gap-1">
            <button onClick={() => setCategory(null)}
              className={`px-2.5 py-1 text-xs rounded-full transition-colors ${!category ? 'bg-slate-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>전체</button>
            {categories.map(c => (
              <button key={c} onClick={() => setCategory(category === c ? null : c)}
                className={`px-2.5 py-1 text-xs rounded-full transition-colors ${category === c ? 'bg-slate-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>{c}</button>
            ))}
          </div>
          <div className="flex gap-1 ml-auto">
            {[['all','전체',null],['high','높음','high'],['mid','중간','mid'],['low','낮음','low']].map(([id,label,val]) => (
              <button key={id} onClick={() => setImportance(val)}
                className={`px-2.5 py-1 text-xs rounded-full transition-colors ${importance === val ? 'bg-slate-900 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>{label}</button>
            ))}
          </div>
        </div>
      </div>
      <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div className="px-5 py-3 border-b border-slate-100 text-xs text-slate-500 flex justify-between">
          <span>총 <b className="text-slate-900 tabular-nums">{filtered.length}</b>건</span>
        </div>
        <table className="w-full text-sm">
          <thead>
            <tr className="text-xs text-slate-500 font-medium border-b border-slate-100">
              <th className="text-left px-5 py-2.5 whitespace-nowrap">날짜</th>
              <th className="text-left px-3 py-2.5 whitespace-nowrap">출처</th>
              <th className="text-left px-3 py-2.5">제목</th>
              <th className="text-left px-3 py-2.5 whitespace-nowrap">카테고리</th>
              <th className="text-left px-3 py-2.5 whitespace-nowrap">중요도</th>
              <th className="text-right px-5 py-2.5 whitespace-nowrap">원문</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(it => {
              const imp = importanceOf(it.analysis.importance_score);
              return (
                <tr key={it.id} onClick={() => onSelect(it)}
                  className="cursor-pointer hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0">
                  <td className="px-5 py-3 text-slate-600 tabular-nums whitespace-nowrap">{it.original.date}</td>
                  <td className="px-3 py-3 text-slate-700 whitespace-nowrap">{it.original.source}</td>
                  <td className="px-3 py-3 text-slate-900 font-medium line-clamp-1 min-w-[260px]">{it.original.title || '(제목 없음)'}</td>
                  <td className="px-3 py-3 whitespace-nowrap"><Tag className={catColor(it.original.category)}>{it.original.category}</Tag></td>
                  <td className="px-5 py-3 whitespace-nowrap"><Tag className={imp.color}>{imp.label}</Tag></td>
                  <td className="px-3 py-3 whitespace-nowrap text-right">
                    {it.original.url ? (
                      <a href={it.original.url} target="_blank" rel="noopener" onClick={e => e.stopPropagation()}
                         className="text-xs text-orange-600 hover:text-orange-700 font-medium whitespace-nowrap">원문 →</a>
                    ) : <span className="text-xs text-slate-300">—</span>}
                  </td>
                </tr>
              );
            })}
            {filtered.length === 0 && <tr><td colSpan="6" className="text-center text-sm text-slate-500 py-12">조건에 맞는 시그널이 없습니다</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

const THREAT_STYLE = {
  high: { pill:"bg-rose-50 text-rose-700",     dot:"bg-rose-500",     label:"위협 높음" },
  mid:  { pill:"bg-amber-50 text-amber-700",   dot:"bg-amber-500",    label:"위협 중간" },
  low:  { pill:"bg-emerald-50 text-emerald-700", dot:"bg-emerald-500", label:"위협 낮음" },
  self: { pill:"bg-orange-50 text-orange-700", dot:"bg-orange-500",   label:"자사" },
};

// 지표 → 0~100 바 길이 변환
const pctAsset  = (v, max = 17)  => v == null ? 0 : Math.min(100, (v / max) * 100);
const pctRating = (v)            => v == null ? 0 : (v / 5) * 100;
const pctHealth = (delinq)       => delinq == null ? 0 : Math.max(6, Math.min(100, 100 - delinq * 8));

// 건전성(연체율) 색상 — 낮을수록 좋음
const healthColor = (d) => d == null ? 'bg-slate-300' : d < 5 ? 'bg-emerald-500' : d < 8 ? 'bg-amber-500' : 'bg-rose-500';
const ratingColor = (r) => r == null ? 'bg-slate-300' : r >= 4 ? 'bg-emerald-500' : r >= 3 ? 'bg-amber-500' : 'bg-rose-500';

function MetricBar({ label, valueText, pct, color }) {
  return (
    <div className="flex items-center gap-2">
      <div className="w-14 flex-shrink-0 text-[10px] font-semibold text-slate-500">{label}</div>
      <div className="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
        <div className={`h-full ${color} rounded-full transition-all`} style={{ width: `${pct}%` }} />
      </div>
      <div className="w-14 flex-shrink-0 text-[11px] font-bold text-slate-800 tabular-nums text-right">{valueText}</div>
    </div>
  );
}

  return (

          return (
            <button key={idea.idea_id} onClick={() => onSelect(idea)}
              className="text-left bg-white border border-slate-200 rounded-xl p-4 hover:border-orange-300 hover:shadow-sm transition-all">
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <span className="text-xs font-mono text-slate-400">{idea.idea_id.toUpperCase()}</span>

            </button>
          );
        })}
      </div>
    </div>
  );
}

function PageSaved({ savedIds, savedSignals, onSelectIdea, onSelectSignal }) {
  const ideas = ideasData.ideas.filter(i => savedIds.includes(i.idea_id));
  const signals = analyzed.data.filter(s => savedSignals.includes(s.id));
  return (
    <div className="space-y-5">
      <div className="bg-white border border-slate-200 rounded-xl p-5">
        <h3 className="text-base font-bold text-slate-900 mb-3">저장한 시그널 <span className="text-sm text-slate-500 font-normal tabular-nums">{signals.length}건</span></h3>
        {signals.length === 0 ? (
          <p className="text-sm text-slate-500 text-center py-6">아직 저장한 시그널이 없습니다. 시그널 상세에서 북마크를 눌러 저장하세요.</p>
        ) : (
          <ul className="divide-y divide-slate-100">
            {signals.map(it => (
              <li key={it.id} onClick={() => onSelectSignal(it)}
                className="py-3 cursor-pointer hover:bg-slate-50 -mx-3 px-3 rounded-lg">
                <div className="flex items-center justify-between mb-1 text-xs text-slate-500">
                  <span className="tabular-nums">{it.original.date} · {it.original.source}</span>
                  <Tag className={importanceOf(it.analysis.importance_score).color}>{importanceOf(it.analysis.importance_score).label}</Tag>
                </div>
                <div className="text-sm font-medium text-slate-900">{it.original.title}</div>
              </li>
            ))}
          </ul>
        )}
      </div>
      <div className="bg-white border border-slate-200 rounded-xl p-5">
        <h3 className="text-base font-bold text-slate-900 mb-3">저장한 아이디어 <span className="text-sm text-slate-500 font-normal tabular-nums">{ideas.length}건</span></h3>
        {ideas.length === 0 ? (
          <p className="text-sm text-slate-500 text-center py-6">아직 저장한 아이디어가 없습니다. 아이디어 상세에서 북마크를 눌러 저장하세요.</p>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {ideas.map(idea => (
              <button key={idea.idea_id} onClick={() => onSelectIdea(idea)}
                className="text-left p-4 bg-slate-50 border border-slate-100 rounded-lg hover:bg-white hover:border-orange-300 transition-colors">
                <div className="flex items-center gap-2 mb-2">
                  <Tag className={GAP_COLOR[idea.gap] || 'bg-slate-100 text-slate-700'}>{idea.gap}</Tag>
                  <span className="text-xs font-mono text-slate-400 ml-auto">{idea.idea_id.toUpperCase()}</span>
                </div>
                <div className="text-sm font-bold text-slate-900 leading-tight mb-1">{idea.service_name}</div>
                <p className="text-xs text-slate-600 line-clamp-2">{idea.problem_definition}</p>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function PageSettings() {
  return (
    <div className="space-y-4 max-w-2xl">
      <div className="bg-white border border-slate-200 rounded-xl p-5">
        <h3 className="text-sm font-bold text-slate-900 mb-3">데이터 업데이트</h3>
        <div className="flex items-center justify-between py-2 border-b border-slate-100">
          <div>
            <div className="text-sm font-medium text-slate-900">자동 수집 주기</div>
            <div className="text-xs text-slate-500 mt-0.5">뉴스·공고를 자동 수집하는 시간</div>
          </div>
          <span className="text-sm font-semibold text-slate-900 tabular-nums">매일 09:00 / 15:00</span>
        </div>
        <div className="flex items-center justify-between py-2 border-b border-slate-100">
          <div>
            <div className="text-sm font-medium text-slate-900">마지막 업데이트</div>
            <div className="text-xs text-slate-500 mt-0.5">최근 수집 완료 시각</div>
          </div>
          <span className="text-sm font-semibold text-slate-900 tabular-nums">{analyzed.timestamp.slice(0,16).replace('T',' ')}</span>
        </div>
        <div className="flex items-center justify-between py-2">
          <div>
            <div className="text-sm font-medium text-slate-900">수집 소스</div>
            <div className="text-xs text-slate-500 mt-0.5">금융위·금감원·뉴스 RSS 등</div>
          </div>
          <span className="text-sm font-semibold text-slate-900 tabular-nums">{(analyzed.sources_requested || []).length || 4}개</span>
        </div>
      </div>
      <div className="bg-white border border-slate-200 rounded-xl p-5">
        <h3 className="text-sm font-bold text-slate-900 mb-3">알림</h3>
        <div className="flex items-center justify-between py-2">
          <div>
            <div className="text-sm font-medium text-slate-900">중요 시그널 알림</div>
            <div className="text-xs text-slate-500 mt-0.5">★5 등급 시그널 발생 시 알림</div>
          </div>
          <label className="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" defaultChecked className="sr-only peer" />
            <div className="w-10 h-6 bg-slate-200 peer-checked:bg-orange-500 rounded-full transition-colors"></div>
            <div className="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full transition-transform peer-checked:translate-x-4"></div>
          </label>

      </div>

function App() {
  const sorted = useMemo(() => [...analyzed.data].sort((a,b)=>b.analysis.importance_score - a.analysis.importance_score), []);
  const [page, setPage] = useState('dashboard');
  const [signal, setSignal] = useState(sorted[0]);
  const [modalIdea, setModalIdea] = useState(null);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [savedIds, setSavedIds] = useState(() => {
    try { return JSON.parse(localStorage.getItem('savedIdeas') || '[]'); } catch { return []; }
  });
  const [savedSignals, setSavedSignals] = useState(() => {
    try { return JSON.parse(localStorage.getItem('savedSignals') || '[]'); } catch { return []; }
  });

  useEffect(() => {
    try { localStorage.setItem('savedIdeas', JSON.stringify(savedIds)); } catch {}
  }, [savedIds]);
  useEffect(() => {
    try { localStorage.setItem('savedSignals', JSON.stringify(savedSignals)); } catch {}
  }, [savedSignals]);

  const kpiTopSignals = sorted.filter(s => s.analysis.importance_score >= 4).length;
  const kpiCompetitors = STAGES.reduce((a,s) => a + (competitor.journey_stages[s]||[]).length, 0);
  const kpiIdeas = ideasData.ideas.length;
  const kpiSaved = savedIds.length + savedSignals.length;

  const toggleSignalSave = () => {
    if (!signal) return;
    setSavedSignals(prev => prev.includes(signal.id) ? prev.filter(x => x !== signal.id) : [...prev, signal.id]);
  };
  const toggleIdeaSave = (ideaId) => {
    setSavedIds(prev => prev.includes(ideaId) ? prev.filter(x => x !== ideaId) : [...prev, ideaId]);
  };

  const handleGenerate = (sig) => {
    setSignal(sig);
    setPickerOpen(true);
  };

  const [allSignalsOpen, setAllSignalsOpen] = useState(false);
  const [allIdeasOpen, setAllIdeasOpen] = useState(false);
  const [journeyDetailOpen, setJourneyDetailOpen] = useState(false);
  const openAllIdeas = () => setAllIdeasOpen(true);

  return (
    <div className="min-h-screen flex bg-slate-50">
      <Sidebar page={page} setPage={setPage} />

      <div className="flex-1 flex flex-col min-w-0">
        <TopBar title={PAGE_TITLE[page] || '대시보드'} onNewIdea={() => setPickerOpen(true)} saved={kpiSaved} />

        <main className="flex-1 overflow-y-auto scroll-thin p-5 sm:p-6">
          {page === 'dashboard' && (
            <div className="space-y-5">
              <div className="grid grid-cols-2 xl:grid-cols-4 gap-4">
                <KpiCard icon="pulse"    iconBg="bg-orange-50"  iconColor="text-orange-600"
                         label="오늘의 핵심 시그널" value={kpiTopSignals} sub="건"
                         deltaValue="2건" deltaLabel="(전일 대비)" />
                <KpiCard icon="building" iconBg="bg-emerald-50" iconColor="text-emerald-600"
                         label="경쟁사 동향" value={kpiCompetitors} sub="건"
                         deltaValue="3건" deltaLabel="(전일 대비)" />
                <KpiCard icon="bulb"     iconBg="bg-amber-50"   iconColor="text-amber-600"
                         label="생성된 아이디어" value={kpiIdeas} sub="개"
                         deltaLabel="최근 7일" />
                <KpiCard icon="star"     iconBg="bg-violet-50"  iconColor="text-violet-600"
                         label="관심 항목" value={kpiSaved} sub="개"
                         deltaLabel="북마크한 항목" />
              </div>
              <div className="grid grid-cols-1 xl:grid-cols-3 gap-5">
                <div className="xl:col-span-2 space-y-5">
                  <SignalsTable items={sorted.slice(0,5)} onSelect={setSignal} selectedId={signal?.id} onSeeAll={() => setAllSignalsOpen(true)} />
                  <div className="grid grid-cols-1 md:grid-cols-5 gap-5">
                    <div className="md:col-span-3"><JourneySummary onSeeAll={() => setJourneyDetailOpen(true)} /></div>
                    <div className="md:col-span-2"><KeywordTrends /></div>
                  </div>
                  <RecentIdeas onSelect={setModalIdea} onNew={() => setPickerOpen(true)} onSeeAll={openAllIdeas} />
                </div>
                <div className="space-y-5">
                  <SignalDetail
                    signal={signal}
                    onGenerate={handleGenerate}
                    onSave={toggleSignalSave}
                    isSaved={signal ? savedSignals.includes(signal.id) : false} />
                  <RecommendedIdeas onSelect={setModalIdea} onSeeAll={openAllIdeas} />
                </div>
              </div>
            </div>
          )}

          {page === 'signals' && <PageSignals onSelect={(it) => { setSignal(it); setPage('dashboard'); }} />}
          {page === 'compet' && <PageCompet onSelectSignal={(it) => { setSignal(it); setPage('dashboard'); }} />}
          {page === 'ideas' && <PageIdeas onSelect={setModalIdea} />}
          {page === 'saved' && <PageSaved savedIds={savedIds} savedSignals={savedSignals}
                                          onSelectIdea={setModalIdea}
                                          onSelectSignal={(it) => { setSignal(it); setPage('dashboard'); }} />}
          {page === 'settings' && <PageSettings />}
        </main>
      </div>

      <IdeaModal idea={modalIdea} onClose={() => setModalIdea(null)}
        onSave={() => modalIdea && toggleIdeaSave(modalIdea.idea_id)}
        isSaved={modalIdea ? savedIds.includes(modalIdea.idea_id) : false} />
      <NewIdeaPicker open={pickerOpen} signal={signal} onClose={() => setPickerOpen(false)}
        onPick={(idea) => { setPickerOpen(false); setModalIdea(idea); }} />
      <AllSignalsModal open={allSignalsOpen} onClose={() => setAllSignalsOpen(false)}
        onSelect={(it) => { setSignal(it); setAllSignalsOpen(false); }} />
      <AllIdeasModal open={allIdeasOpen} onClose={() => setAllIdeasOpen(false)}
        onSelect={(idea) => { setModalIdea(idea); setAllIdeasOpen(false); }} />
      <JourneyDetailModal open={journeyDetailOpen} onClose={() => setJourneyDetailOpen(false)} />
    </div>
  );
}

// ============ LoginGate ============
function LoginGate({ onUnlock }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState(null);
  const [loading, setLoading] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    if (!pw) return;
    setLoading(true); setErr(null);
    try {
      await decryptData(pw);
      try { sessionStorage.setItem('mi_pw', pw); } catch {}
      onUnlock();
    } catch (e2) {
      setErr('비밀번호가 올바르지 않습니다.');
      setLoading(false);
    }
  };
  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100 p-6">
      <div className="w-full max-w-sm bg-white border border-slate-200 rounded-2xl shadow-lg p-8">
        <div className="flex flex-col items-center mb-6">
          <div className="w-14 h-14 rounded-xl bg-gradient-to-br from-orange-500 to-orange-600 flex items-center justify-center text-white font-bold text-lg tracking-tight mb-3">OK</div>
          <h1 className="text-lg font-extrabold text-slate-900 tracking-tight">Market Intelligence</h1>
          <p className="text-xs text-orange-600 font-semibold mt-0.5">OK저축은행 · 내부 전용</p>
        </div>
        <form onSubmit={submit} className="space-y-3">
          <div>
            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">비밀번호</label>
            <input
              type="password"
              autoFocus
              value={pw}
              onChange={e => setPw(e.target.value)}
              disabled={loading}
              className={`w-full px-4 py-2.5 text-sm border rounded-lg focus:outline-none transition-colors ${
                err ? 'border-rose-300 bg-rose-50' : 'border-slate-300 focus:border-orange-400'
              }`}
              placeholder="Enter password" />
            {err && <div className="mt-1.5 text-xs text-rose-600">⚠ {err}</div>}
          </div>
          <button type="submit" disabled={loading || !pw}
            className="w-full py-2.5 bg-orange-500 text-white text-sm font-semibold rounded-lg hover:bg-orange-600 disabled:bg-slate-200 disabled:text-slate-400 transition-colors">
            {loading ? '확인 중...' : '로그인'}
          </button>
        </form>
        <div className="mt-6 pt-4 border-t border-slate-100 text-[11px] text-slate-500 leading-relaxed">
          <p className="mb-1">📢 <b className="text-slate-700">보안 안내</b></p>
          <p>경쟁사 분석·자사 지표·신규 아이디어가 포함되어 있습니다. 비밀번호를 외부로 공유하지 마세요.</p>
        </div>
      </div>
    </div>
  );
}

function Root() {
  const [unlocked, setUnlocked] = useState(false);
  useEffect(() => {
    // Try auto-unlock from sessionStorage
    let saved = null;
    try { saved = sessionStorage.getItem('mi_pw'); } catch {}
    if (saved) {
      decryptData(saved).then(() => setUnlocked(true)).catch(() => {
        try { sessionStorage.removeItem('mi_pw'); } catch {}
      });
    }
  }, []);
  if (!unlocked) return <LoginGate onUnlock={() => setUnlocked(true)} />;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
