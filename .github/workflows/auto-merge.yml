name: Auto-merge Claude routine updates

on:
  push:
    branches:
      - 'claude/**'

concurrency:
  group: auto-merge-main
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Merge claude branch into main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git fetch origin "${GITHUB_REF_NAME}"
          git merge --no-ff "origin/${GITHUB_REF_NAME}" -m "auto-merge ${GITHUB_REF_NAME} into main"
          git push origin main

      - name: Delete merged branch
        run: git push origin --delete "${GITHUB_REF_NAME}"
